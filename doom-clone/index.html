<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOM Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #container {
      position: relative;
      width: 800px;
      height: 600px;
    }
    canvas {
      display: block;
      cursor: crosshair;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #overlay h1 {
      font-size: 80px;
      color: #ff2222;
      text-shadow: 0 0 20px #ff0000, 0 0 50px #cc0000;
      letter-spacing: 12px;
      margin-bottom: 4px;
    }
    #overlay .sub {
      color: #ff8888;
      font-size: 20px;
      letter-spacing: 6px;
      margin-bottom: 30px;
    }
    .controls {
      color: #777;
      font-size: 14px;
      text-align: center;
      line-height: 2;
    }
    .controls span { color: #ffcc00; }
    #start-btn {
      margin-top: 28px;
      padding: 12px 48px;
      background: #7a0000;
      color: #fff;
      border: 2px solid #ff4444;
      font-size: 20px;
      font-family: inherit;
      letter-spacing: 4px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    #start-btn:hover {
      background: #cc0000;
      box-shadow: 0 0 24px #ff4444;
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="overlay">
      <h1>DOOM</h1>
      <p class="sub">CLONE</p>
      <div class="controls">
        <p><span>W A S D</span> &mdash; Move &amp; Strafe</p>
        <p><span>Mouse</span> &mdash; Aim (after click)</p>
        <p><span>Left Click / SPACE</span> &mdash; Shoot</p>
        <p><span>Arrow Keys</span> &mdash; Rotate (no mouse)</p>
        <p><span>ESC</span> &mdash; Release mouse</p>
      </div>
      <button id="start-btn" onclick="startGame()">CLICK TO PLAY</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
