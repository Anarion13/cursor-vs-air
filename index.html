<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air vs Cursor</title>
    <style>
      @font-face {
        font-family: 'Komuna';
        src: url('src/fonts/KomunaVar.ttf') format('truetype');
        font-weight: 100 900;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        color-scheme: dark;
      }

      body {
        min-height: 100vh;
        background: #16181B;
        color: rgba(255, 255, 255, 0.85);
        font-family: Inter, 'Segoe UI', 'Helvetica Neue', sans-serif;
      }

      .header-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        pointer-events: none;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        width: min(1040px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 60px 0 72px;
      }

      .top-bar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 48px;
      }

      h1 {
        font-family: 'Komuna', sans-serif;
        font-weight: 129;
        font-size: clamp(2.5rem, 5.5vw, 4rem);
        line-height: 1;
        letter-spacing: -0.01em;
        text-transform: lowercase;
        color: #fff;
        font-variation-settings: 'wdth' 100;
      }

      .stats {
        display: flex;
        align-items: center;
        gap: 32px;
        padding-bottom: 4px;
      }

      .arcs-svg {
        flex-shrink: 0;
      }

      .score-labels {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .score-item {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      .score-number {
        font-family: 'Komuna', sans-serif;
        font-weight: 129;
        font-size: 36px;
        line-height: 40px;
        text-transform: lowercase;
        font-variation-settings: 'wdth' 100;
      }

      .score-number.air {
        color: #3BA0CF;
      }

      .score-number.cursor {
        color: #EC5D6F;
      }

      .score-number.tied {
        color: #fff;
      }

      .score-label {
        font-size: 14px;
        font-weight: 380;
        line-height: 20px;
        color: rgba(255, 255, 255, 0.52);
        white-space: nowrap;
      }

      .table-container {
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      thead th {
        padding: 15px 24px;
        font-family: 'Komuna', sans-serif;
        font-weight: 129;
        font-size: 24px;
        line-height: 31px;
        text-transform: lowercase;
        color: rgba(255, 255, 255, 0.52);
        text-align: left;
        background: rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-variation-settings: 'wdth' 100;
      }


      th.col-feature {
        width: 38%;
      }

      th.col-air {
        width: 16%;
      }

      th.col-cursor {
        width: 46%;
      }

      tbody tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      tbody tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.03);
      }

      tbody tr:last-child {
        border-bottom: none;
      }


      tbody td {
        padding: 15px 24px;
        vertical-align: middle;
        font-size: 16px;
        line-height: 22px;
        font-weight: 380;
        letter-spacing: 0.004em;
        color: rgba(255, 255, 255, 0.85);
      }


      td.status img {
        width: 36px;
        height: 36px;
      }

      @media (max-width: 760px) {
        .page {
          width: min(100vw - 24px, 1040px);
          padding: 80px 0 48px;
        }

        .top-bar {
          flex-direction: column;
          align-items: flex-start;
          gap: 24px;
          margin-bottom: 32px;
        }

        .stats {
          gap: 20px;
        }

        .arcs-svg {
          width: 90px;
          height: 52px;
        }

        .score-number {
          font-size: 28px;
          line-height: 32px;
        }

        thead th {
          font-size: 18px;
          padding: 14px 16px;
        }

        tbody td {
          padding: 14px 16px;
          font-size: 16px;
          line-height: 22px;
        }

        td.status img {
          width: 28px;
          height: 28px;
        }
      }
    </style>
  </head>
  <body>
    <img class="header-bg" src="src/svg/header.svg" alt="" aria-hidden="true" />

    <main class="page">
      <div class="top-bar">
        <h1>air vs cursor</h1>
        <div class="stats">
          <svg class="arcs-svg" id="arcs" width="120" height="68" viewBox="0 0 120 68" fill="none"></svg>
          <div class="score-labels">
            <div class="score-item">
              <span class="score-number air" id="air-wins">0</span>
              <span class="score-label">Air wins</span>
            </div>
            <div class="score-item">
              <span class="score-number cursor" id="cursor-wins">0</span>
              <span class="score-label">Cursor wins</span>
            </div>
            <div class="score-item">
              <span class="score-number tied" id="tied-count">0</span>
              <span class="score-label">Tied</span>
            </div>
          </div>
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="col-feature" scope="col">feature</th>
              <th class="col-air" scope="col">air</th>
              <th class="col-cursor" scope="col">cursor</th>
            </tr>
          </thead>
          <tbody id="comparison-body"></tbody>
        </table>
      </div>
    </main>

    <script>
      const rows = [
        { feature: "Multi-agent support", air: true, cursor: false },
        { feature: "Run many agents in parallel", air: true, cursor: true },
        { feature: "Multi-workspaces", air: false, cursor: true },
        { feature: "Comments", air: true, cursor: false },
        { feature: "Start from Desktop", air: true, cursor: true },
        { feature: "Start from Web", air: true, cursor: true },
        { feature: "Start from Mobile", air: false, cursor: true },
        { feature: "Start from Slack/GitHub", air: false, cursor: true },
        { feature: "Windows support", air: false, cursor: true },
        { feature: "Linux support", air: false, cursor: true },
        { feature: "Move tasks from Local \u2192 Cloud", air: false, cursor: true },
        { feature: "Move tasks from Cloud \u2192 Local", air: false, cursor: true },
        { feature: "Create PR", air: false, cursor: true },
        { feature: "Commit & Push", air: false, cursor: true },
        { feature: "Editor with LSPs", air: true, cursor: true },
        { feature: "Integrated browser", air: true, cursor: true },
        { feature: "Plugins", air: false, cursor: true },
        { feature: "Voice input", air: false, cursor: true }
      ];

      const body = document.getElementById("comparison-body");
      const airWinsEl = document.getElementById("air-wins");
      const cursorWinsEl = document.getElementById("cursor-wins");
      const tiedEl = document.getElementById("tied-count");
      const arcsSvg = document.getElementById("arcs");

      function getWinner(row) {
        if (row.air === row.cursor) return "tie";
        return row.air ? "air" : "cursor";
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"]/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;"
        })[c]);
      }

      function renderIcon(value) {
        const src = value ? "src/svg/good.svg" : "src/svg/bad.svg";
        const label = value ? "Supported" : "Not supported";
        return `<img src="${src}" alt="${label}" title="${label}" />`;
      }

      function renderArcs(airWins, cursorWins) {
        const total = rows.length;
        const cx = 60;
        const cy = 62;
        const outerR = 52;
        const innerR = 38;
        const strokeW = 6;
        const halfCircumOuter = Math.PI * outerR;
        const halfCircumInner = Math.PI * innerR;

        const airFill = (airWins / total) * halfCircumOuter;
        const cursorFill = (cursorWins / total) * halfCircumInner;

        arcsSvg.innerHTML = `
          <path d="M ${cx - outerR} ${cy} A ${outerR} ${outerR} 0 1 1 ${cx + outerR} ${cy}"
                stroke="rgba(255,255,255,0.06)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" />
          <path d="M ${cx - outerR} ${cy} A ${outerR} ${outerR} 0 1 1 ${cx + outerR} ${cy}"
                stroke="#3BA0CF" stroke-width="${strokeW}" fill="none" stroke-linecap="round"
                stroke-dasharray="${halfCircumOuter}" stroke-dashoffset="${halfCircumOuter - airFill}" />
          <path d="M ${cx - innerR} ${cy} A ${innerR} ${innerR} 0 1 1 ${cx + innerR} ${cy}"
                stroke="rgba(255,255,255,0.06)" stroke-width="${strokeW}" fill="none" stroke-linecap="round" />
          <path d="M ${cx - innerR} ${cy} A ${innerR} ${innerR} 0 1 1 ${cx + innerR} ${cy}"
                stroke="#EC5D6F" stroke-width="${strokeW}" fill="none" stroke-linecap="round"
                stroke-dasharray="${halfCircumInner}" stroke-dashoffset="${halfCircumInner - cursorFill}" />
        `;
      }

      function render() {
        body.innerHTML = rows.map((row) => `
          <tr>
            <td class="feature">${escapeHtml(row.feature)}</td>
            <td class="status">${renderIcon(row.air)}</td>
            <td class="status">${renderIcon(row.cursor)}</td>
          </tr>
        `).join("");

        const airWins = rows.filter((r) => getWinner(r) === "air").length;
        const cursorWins = rows.filter((r) => getWinner(r) === "cursor").length;
        const ties = rows.filter((r) => getWinner(r) === "tie").length;

        airWinsEl.textContent = airWins;
        cursorWinsEl.textContent = cursorWins;
        tiedEl.textContent = ties;

        renderArcs(airWins, cursorWins);
      }

      render();
    </script>
  </body>
</html>
